<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dito App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f7f7f7;
            --text: #000000;
            --text-muted: #717171;
            --border: #e2e2e2;
            --accent: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .screen {
            padding: 2rem 1rem 6rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 1.2rem;
            border-radius: 999px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        input {
            width: 100%;
            background: #fff;
            border: 1.5px solid #e0e0e0;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem;
            border-radius: 999px;
            color: black;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #000;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 1rem;
        }

        .input-icon {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #000;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const e = React.createElement;

        const Icon = ({ name, size = 24, color = "currentColor" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return e('i', { 'data-lucide': name, style: { width: size, height: size, color: color } });
        };

        const App = () => {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('dito_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [activeTab, setActiveTab] = useState('inicio');
            const [email, setEmail] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleLogin = () => {
                const name = email.split('@')[0] || 'Usuário';
                const newUser = { name, balance: 1450.00 };
                setUser(newUser);
                localStorage.setItem('dito_user', JSON.stringify(newUser));
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('dito_user');
            };

            const screens = user ? {
                inicio: e('div', null,
                    e('div', { className: 'flex-between', style: { marginBottom: '2rem' } },
                        e('div', { className: 'avatar' }, (user.name ? user.name[0] : 'U').toUpperCase()),
                        e('div', { className: 'flex-between', style: { gap: '1.2rem' } },
                            e('div', { style: { cursor: 'pointer' } }, e(Icon, { name: 'search' })),
                            e('div', { style: { cursor: 'pointer', color: '#ff4444' }, onClick: handleLogout }, e(Icon, { name: 'log-out' }))
                        )
                    ),
                    e('div', { className: 'card' },
                        e('p', { style: { fontSize: '14px', color: 'var(--text-muted)' } }, 'Saldo total'),
                        e('h2', { style: { fontSize: '2.5rem', margin: '0.5rem 0' } }, 'R$ ' + user.balance.toLocaleString('pt-BR')),
                        e('div', { className: 'btn', style: { padding: '0.5rem', textAlign: 'center', marginTop: '1rem', background: '#f0f0f0', color: '#000' } }, 'Acessar histórico')
                    ),
                    e('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' } },
                        e('div', { className: 'card' }, e(Icon, { name: 'users', size: 20, color: '#000' }), e('p', { style: { marginTop: '0.5rem' } }, 'Indicados')),
                        e('div', { className: 'card' }, e(Icon, { name: 'trending-up', size: 20, color: '#000' }), e('p', { style: { marginTop: '0.5rem' } }, 'Vendas'))
                    )
                ),
                mercado: e('div', null,
                    e('h2', { style: { marginBottom: '1.5rem' } }, 'Mercado'),
                    [1,2,3].map(i => e('div', { key: i, className: 'card flex-between', style: { padding: '1.2rem' } },
                        e('div', null, e('p', { style: { fontWeight: '600' } }, 'Produto Digital #' + i), e('p', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, '80% de comissão')),
                        e(Icon, { name: 'chevron-right', color: '#000' })
                    ))
                ),
                produtos: e('div', null, e('h2', null, 'Produtos'), e('p', { style: { marginTop: '1rem', color: 'var(--text-muted)' } }, 'Lista vazia')),
                links: e('div', null, e('h2', null, 'Links'), e('p', { style: { marginTop: '1rem', color: 'var(--text-muted)' } }, 'Nenhum link gerado')),
                sacar: e('div', null, 
                    e('h2', { style: { marginBottom: '1.5rem' } }, 'Retirada'),
                    e('div', { className: 'card', style: { textAlign: 'center', padding: '2rem' } },
                        e('p', { style: { color: 'var(--text-muted)' } }, 'Disponível'),
                        e('h3', { style: { fontSize: '2rem', margin: '1rem 0' } }, 'R$ ' + user.balance.toLocaleString('pt-BR')),
                        e('button', { className: 'btn' }, 'Transferir')
                    )
                ),
                perfil: e('div', { className: 'flex-col gap-4' }, 
                    e('h2', { style: { marginBottom: '1.5rem' } }, 'Perfil'),
                    e('div', { className: 'card flex-between' }, e('span', null, 'Meus Dados'), e(Icon, { name: 'chevron-right', color: '#000' })),
                    e('div', { className: 'card flex-between' }, e('span', null, 'Segurança'), e(Icon, { name: 'chevron-right', color: '#000' })),
                    e('button', { className: 'btn', onClick: handleLogout, style: { background: '#fbeded', color: '#d93025' } }, 'Sair')
                )
            } : {};

            return e('div', { style: { minHeight: '100vh', position: 'relative' } },
                !user ? (
                    // TELA DE LOGIN
                    e('div', { className: 'login-container', style: { textAlign: 'center' } },
                        e('div', { style: { marginBottom: '3rem' } },
                            e('h1', { style: { fontSize: '3.5rem', fontWeight: '700', letterSpacing: '-2px' } }, 'Dito'),
                            e('p', { style: { color: 'var(--text-muted)', fontSize: '16px' } }, 'Chame seus amigos!')
                        ),
                        e('div', { className: 'flex-col' },
                            e('div', { className: 'input-wrapper' },
                                e('div', { className: 'input-icon' }, e(Icon, { name: 'user', size: 20 })),
                                e('input', { 
                                    type: 'text', 
                                    placeholder: 'Nome de usuário', 
                                    value: email, 
                                    onChange: (ev) => setEmail(ev.target.value)
                                })
                            ),
                            e('div', { className: 'input-wrapper' },
                                e('div', { className: 'input-icon' }, e(Icon, { name: 'key', size: 20 })),
                                e('input', { 
                                    type: showPassword ? 'text' : 'password', 
                                    placeholder: 'Senha'
                                }),
                                e('div', { 
                                    style: { position: 'absolute', right: '1.5rem', top: '50%', transform: 'translateY(-50%)', cursor: 'pointer', color: '#888', display: 'flex' },
                                    onClick: () => setShowPassword(!showPassword)
                                }, 
                                    e(Icon, { name: showPassword ? 'eye' : 'eye-off', size: 20 })
                                )
                            ),
                            e('button', { 
                                className: 'btn', 
                                onClick: handleLogin,
                                style: { marginTop: '1rem' }
                            }, 'Entrar'),
                            e('button', { 
                                className: 'btn', 
                                onClick: handleLogin, 
                                style: { marginTop: '0.8rem', background: 'transparent', color: '#888', border: '1px solid #e2e2e2' } 
                            }, 'Entrar como convidado')
                        )
                    )
                ) : (
                    // TELA PRINCIPAL (LOGADO)
                    e('div', { key: 'main-app' },
                        e('div', { className: 'screen', key: activeTab }, screens[activeTab]),
                        e('div', { className: 'bottom-nav' },
                            [
                                { id: 'inicio', icon: 'home', label: 'Início' },
                                { id: 'mercado', icon: 'shopping-bag', label: 'Mercado' },
                                { id: 'produtos', icon: 'package', label: 'Produtos' },
                                { id: 'links', icon: 'link', label: 'Links' },
                                { id: 'sacar', icon: 'wallet', label: 'Sacar' },
                                { id: 'perfil', icon: 'user', label: 'Perfil' }
                            ].map(tab => e('div', { 
                                key: tab.id, 
                                className: 'nav-item ' + (activeTab === tab.id ? 'active' : ''),
                                onClick: () => setActiveTab(tab.id)
                            }, e(Icon, { name: tab.icon, size: 24, color: activeTab === tab.id ? '#000' : '#888' }), e('span', null, tab.label)))
                        )
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
